<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zomato-Order Food Online</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo"><img src="zomato.png" alt="Zomato Logo"></div>
      <ul>
        <li><a href="">Dining Out</a></li> 
        <li><a href="">Delivery</a></li>
        <li><a href="">Login</a></li>
        <li><a href="">Sign up</a></li>
      </ul>
    </header>

    <main>
      <div class="hero">
        <h1>restaurants</h1> 
        <p class="tagline">
            Explore curated lists of top restaurants, cafes, pubs, and bars in Bengaluru, based on trends
        </p>
        
        <div class="hero-image-wrapper">
            <img src="food.jpg" alt="Food Image" class="hero-image" />
            <input placeholder="Search for cuisines.." />
        </div>
        
        <p class="content-after-hero">Your next great meal is just a click away.</p>
        
      </div>
    </main>

    <footer>
        Copyright &copy;|All rights reserved 2025
    </footer>
    <script src="js/script.js"></script>
  </body>
</html>
