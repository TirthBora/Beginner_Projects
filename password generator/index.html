<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🔐 Random Password Generator</h1>

    <label for="length">Password length:</label>
    <input type="number" id="length" value="12" min="4" max="30"><br>

    <label><input type="checkbox" id="includeLower" checked> Include lowercase letters</label><br>
    <label><input type="checkbox" id="includeUpper" checked> Include uppercase letters</label><br>
    <label><input type="checkbox" id="includeNumbers" checked> Include numbers</label><br>
    <label><input type="checkbox" id="includeSymbols"> Include symbols</label><br>

    <button id="generateBtn">Generate Password</button>

    <p id="result"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
